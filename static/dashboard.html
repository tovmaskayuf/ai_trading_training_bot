<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Crypto Trading and Training by TT</title>
<style>
/* ══ Design tokens ══════════════════════════════════════════════════════ */
:root {
  color-scheme: dark;
  --bg:#0B1119; --surface-1:#111927; --surface-2:#16202E; --surface-3:#1D2A3C;
  --border:#223042; --border-bright:#2F4258;
  --text-primary:#EDF2F7; --text-secondary:#9DAFC4; --text-muted:#64748B;

  /* Categorical slots 1–4 (dark steps) — validated all-pairs subset.
     Every use is direct-labeled, never color-alone. */
  --axis-momentum:#3987e5; --axis-risk:#008300;
  --axis-structure:#d55181; --axis-relative:#c98500;

  --good:#0ca30c; --warning:#fab219; --critical:#d03b3b;
  --accent:#3987e5; --accent-dim:rgba(57,135,229,.13);
  --good-dim:rgba(12,163,12,.12); --critical-dim:rgba(208,59,59,.12);
  --grid:rgba(255,255,255,.05);
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 12px 40px rgba(0,0,0,.5);

  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Helvetica,Arial,sans-serif;
  --r:14px; --r-sm:10px;
}
:root[data-theme="light"] {
  color-scheme: light;
  --bg:#F4F6F9; --surface-1:#FFFFFF; --surface-2:#F8FAFC; --surface-3:#EEF2F7;
  --border:#E5EAF1; --border-bright:#D3DCE7;
  --text-primary:#1D2B39; --text-secondary:#5A6B7E; --text-muted:#8A99A8;
  --axis-momentum:#2a78d6; --axis-risk:#008300;
  --axis-structure:#e87ba4; --axis-relative:#eda100;
  --accent:#2a78d6; --accent-dim:rgba(42,120,214,.10);
  --good-dim:rgba(12,163,12,.09); --critical-dim:rgba(208,59,59,.08);
  --grid:rgba(29,43,57,.07);
  --shadow:0 1px 3px rgba(29,43,57,.08);
  --shadow-lg:0 12px 40px rgba(29,43,57,.16);
}

* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text-primary);
  font:14px/1.5 var(--sans); -webkit-font-smoothing:antialiased;
}
button { font-family:inherit; }
.num { font-family:var(--mono); font-variant-numeric:tabular-nums; }
.pos { color:var(--good); } .neg { color:var(--critical); }
.hide { display:none !important; }

/* ══ Landing ════════════════════════════════════════════════════════════ */
#landing {
  position:fixed; inset:0; z-index:500; overflow-y:auto;
  background:var(--bg);
  transition:opacity .45s ease, transform .45s ease;
}
#landing.leaving { opacity:0; transform:translateY(-26px); pointer-events:none; }
.land-bg { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
.land-bg::before {
  content:''; position:absolute; inset:0;
  background-image:linear-gradient(var(--grid) 1px, transparent 1px),
                   linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 65% at 50% 0%, #000 30%, transparent 75%);
}
.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:.35;
       animation:drift 16s ease-in-out infinite alternate; }
.orb-1 { width:480px; height:480px; top:-160px; left:-120px;
         background:radial-gradient(circle, var(--accent), transparent 65%); }
.orb-2 { width:420px; height:420px; bottom:-140px; right:-100px;
         background:radial-gradient(circle, #1baf7a, transparent 65%);
         animation-delay:-8s; }
@keyframes drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(46px,30px) scale(1.12); }
}

.land-wrap {
  position:relative; max-width:860px; margin:0 auto;
  padding:56px 24px 80px; display:flex; flex-direction:column; align-items:center;
}
.land-top { position:absolute; top:18px; right:20px; display:flex; gap:8px; }

.land-logo { width:84px; height:84px; margin-bottom:22px;
  filter:drop-shadow(0 10px 30px rgba(42,120,214,.35));
  opacity:0; animation:logoPop .8s cubic-bezier(.34,1.56,.64,1) .15s forwards; }
@keyframes logoPop {
  0%   { opacity:0; transform:scale(.4) rotate(-8deg); }
  70%  { opacity:1; transform:scale(1.07) rotate(1deg); }
  100% { opacity:1; transform:scale(1) rotate(0); }
}
.land-title {
  font-size:clamp(24px,4.4vw,38px); font-weight:700; letter-spacing:-.03em;
  text-align:center; line-height:1.15;
  opacity:0; animation:riseIn .7s cubic-bezier(.22,1,.36,1) .5s forwards;
}
.land-title .by {
  background:linear-gradient(120deg,var(--accent),#1baf7a);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.land-tag {
  margin-top:12px; color:var(--text-secondary); font-size:15px; text-align:center;
  max-width:520px; opacity:0; animation:riseIn .7s cubic-bezier(.22,1,.36,1) .68s forwards;
}
@keyframes riseIn {
  from { opacity:0; transform:translateY(26px); }
  to   { opacity:1; transform:none; }
}

.land-cards { width:100%; margin-top:40px; display:flex; flex-direction:column; gap:16px; }
.land-card {
  background:var(--surface-1); border:1px solid var(--border);
  border-radius:var(--r); padding:22px 24px; box-shadow:var(--shadow);
  opacity:0; animation:riseIn .75s cubic-bezier(.22,1,.36,1) forwards;
}
.land-card:nth-child(1) { animation-delay:.86s; }
.land-card:nth-child(2) { animation-delay:1.02s; }
.land-card:nth-child(3) { animation-delay:1.18s; }
.land-card h3 { font-size:15px; font-weight:650; letter-spacing:-.01em;
  display:flex; align-items:center; gap:9px; }
.land-card h3 .step {
  width:22px; height:22px; border-radius:7px; background:var(--accent-dim);
  color:var(--accent); font:700 12px var(--mono);
  display:grid; place-items:center; flex:none;
}
.land-card .sub { color:var(--text-muted); font-size:12.5px; margin:5px 0 16px 31px; }

.lang-row { display:flex; gap:8px; flex-wrap:wrap; margin-left:31px; }
.lang-pill {
  padding:9px 18px; border-radius:999px; cursor:pointer; font-size:13.5px;
  background:var(--surface-2); border:1.5px solid var(--border);
  color:var(--text-secondary); transition:.18s;
}
.lang-pill:hover { border-color:var(--border-bright); color:var(--text-primary); }
.lang-pill.on { background:var(--accent-dim); border-color:var(--accent);
  color:var(--accent); font-weight:600; }

.coin-tools { display:flex; gap:8px; align-items:center; margin:0 0 12px 31px; }
.mini-btn {
  padding:5px 12px; border-radius:999px; font-size:11.5px; cursor:pointer;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-secondary); transition:.15s;
}
.mini-btn:hover { color:var(--text-primary); border-color:var(--border-bright); }
.coin-count { font-size:11.5px; color:var(--text-muted); margin-left:auto; font-family:var(--mono); }
.coin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:8px; margin-left:31px; }
.coin-row {
  display:flex; align-items:center; gap:10px; padding:9px 12px;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r-sm); cursor:pointer; transition:.15s; user-select:none;
}
.coin-row:hover { border-color:var(--border-bright); }
.coin-row.on { border-color:color-mix(in srgb, var(--accent) 45%, transparent);
  background:var(--accent-dim); }
.coin-row .ct { flex:1; min-width:0; }
.coin-row .cs { font-weight:650; font-size:13px; }
.coin-row .cn { font-size:10.5px; color:var(--text-muted); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; }
.sw { position:relative; width:34px; height:20px; flex:none; }
.sw input { opacity:0; width:0; height:0; position:absolute; }
.sw .tr {
  position:absolute; inset:0; border-radius:999px; background:var(--surface-3);
  border:1px solid var(--border-bright); transition:.2s;
}
.sw .tr::after {
  content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;
  border-radius:50%; background:var(--text-muted); transition:.2s;
}
.sw input:checked + .tr { background:var(--accent); border-color:var(--accent); }
.sw input:checked + .tr::after { transform:translateX(14px); background:#fff; }

.cap-row { display:flex; flex-direction:column; gap:12px; margin-left:31px; }
.cap-input-wrap { position:relative; max-width:320px; }
.cap-input-wrap .pfx { position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--text-muted); font:600 18px var(--mono); pointer-events:none; }
.cap-input {
  width:100%; padding:14px 16px 14px 34px; font:650 20px var(--mono);
  background:var(--surface-2); border:1.5px solid var(--border);
  border-radius:12px; color:var(--text-primary); outline:none; transition:.15s;
}
.cap-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.cap-chips { display:flex; gap:7px; flex-wrap:wrap; }
.cap-chips button {
  padding:7px 14px; border-radius:999px; font:500 12px var(--mono); cursor:pointer;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-secondary); transition:.15s;
}
.cap-chips button:hover { border-color:var(--accent); color:var(--accent); }
.cap-note { font-size:11.5px; color:var(--text-muted); }

.land-cta {
  margin-top:34px; padding:15px 46px; border:none; border-radius:999px;
  font:650 16px var(--sans); color:#fff; cursor:pointer; letter-spacing:.01em;
  background:linear-gradient(120deg, var(--accent), #1b6fd0 60%, #1baf7a 140%);
  box-shadow:0 10px 32px rgba(42,120,214,.35);
  opacity:0; animation:riseIn .7s cubic-bezier(.22,1,.36,1) 1.36s forwards;
  transition:transform .18s, box-shadow .18s, filter .18s;
}
.land-cta:hover { transform:translateY(-2px); filter:brightness(1.08);
  box-shadow:0 14px 40px rgba(42,120,214,.45); }
.land-cta:active { transform:none; }
.land-err { margin-top:14px; color:var(--critical); font-size:13px; min-height:18px;
  text-align:center; }

@media (prefers-reduced-motion: reduce) {
  .land-logo, .land-title, .land-tag, .land-card, .land-cta { animation:none; opacity:1; }
  .orb { animation:none; }
  #landing, #landing.leaving { transition:none; }
}

/* ══ App chrome ═════════════════════════════════════════════════════════ */
#app { opacity:0; transition:opacity .4s ease; }
#app.ready { opacity:1; }
header {
  position:sticky; top:0; z-index:50;
  background:color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:12px 22px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.brand { display:flex; align-items:center; gap:11px; min-width:0; }
.brand svg { width:32px; height:32px; flex:none; }
.brand .bt { font-size:14.5px; font-weight:700; letter-spacing:-.02em; white-space:nowrap; }
.brand .bt .by { color:var(--accent); }
.brand .bs { font-size:11px; color:var(--text-muted); font-family:var(--mono); }
.status { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-secondary); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--good); animation:pulse 2.4s infinite; }
.dot.off { background:var(--text-muted); animation:none; }
.dot.err { background:var(--critical); }
@keyframes pulse {
  0% { box-shadow:0 0 0 0 color-mix(in srgb,var(--good) 55%,transparent); }
  70% { box-shadow:0 0 0 7px transparent; } 100% { box-shadow:0 0 0 0 transparent; }
}
.spacer { flex:1; }
.btn {
  background:var(--surface-1); border:1px solid var(--border); color:var(--text-secondary);
  padding:7px 14px; border-radius:999px; font-size:12.5px; cursor:pointer; transition:.15s;
}
.btn:hover { border-color:var(--border-bright); color:var(--text-primary); }
.btn.icon { padding:7px 10px; }
.tabs { display:flex; gap:3px; background:var(--surface-1); padding:3px;
  border-radius:999px; border:1px solid var(--border); }
.tabs .btn { border:none; background:transparent; }
.tabs .btn.on { background:var(--accent); color:#fff; font-weight:600; }
select.lang-sel {
  background:var(--surface-1); border:1px solid var(--border); color:var(--text-secondary);
  padding:7px 10px; border-radius:999px; font-size:12.5px; cursor:pointer; outline:none;
  font-family:inherit;
}

main { max-width:1480px; margin:0 auto; padding:22px; }

/* ══ Cards, tiles, panels ═══════════════════════════════════════════════ */
.tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px; margin-bottom:20px; }
.tile {
  background:var(--surface-1); border:1px solid var(--border);
  border-radius:var(--r); padding:16px 18px; box-shadow:var(--shadow);
}
.tile.click { cursor:pointer; transition:.16s; position:relative; }
.tile.click:hover { border-color:var(--border-bright); transform:translateY(-2px);
  box-shadow:var(--shadow-lg); }
.tile.click::after { content:'→'; position:absolute; top:14px; right:15px;
  color:var(--text-muted); font-size:12px; opacity:0; transition:.16s; }
.tile.click:hover::after { opacity:1; }
.tile .label { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em;
  color:var(--text-muted); margin-bottom:7px; font-weight:650; }
.tile .value { font-size:22px; font-weight:650; letter-spacing:-.02em; }
.tile .meta { font-size:11.5px; color:var(--text-secondary); margin-top:3px; }

.panel { background:var(--surface-1); border:1px solid var(--border);
  border-radius:var(--r); margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow); }
.panel-head { padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.panel-head h2 { font-size:13.5px; font-weight:650; letter-spacing:-.01em; }
.panel-head .hint { font-size:11.5px; color:var(--text-muted); }

/* ══ Range pills ════════════════════════════════════════════════════════ */
.ranges { display:flex; gap:3px; background:var(--surface-2); padding:3px;
  border-radius:999px; border:1px solid var(--border); width:max-content; }
.ranges button {
  padding:5px 12px; border:none; border-radius:999px; cursor:pointer;
  background:transparent; color:var(--text-secondary);
  font:600 11px var(--mono); transition:.15s;
}
.ranges button:hover { color:var(--text-primary); }
.ranges button.on { background:var(--accent); color:#fff; }

/* ══ Table ══════════════════════════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  text-align:right; padding:10px 13px; font-size:10.5px; font-weight:650;
  text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted);
  border-bottom:1px solid var(--border); white-space:nowrap;
  cursor:pointer; user-select:none; position:sticky; top:0; background:var(--surface-1); z-index:2;
}
thead th:first-child, thead th.l { text-align:left; }
thead th:hover { color:var(--text-secondary); }
thead th .arrow { opacity:.5; margin-left:3px; font-size:9px; }
tbody td { padding:11px 13px; text-align:right; border-bottom:1px solid var(--grid); white-space:nowrap; }
tbody td:first-child, tbody td.l { text-align:left; }
tbody tr { cursor:pointer; transition:background .12s; }
tbody tr:hover { background:var(--surface-2); }
tbody tr:last-child td { border-bottom:none; }

.sym { display:flex; align-items:center; gap:9px; }
.sym .tick { font-weight:650; font-size:13.5px; }
.sym .nm { font-size:11px; color:var(--text-muted); }
.tag { font-size:9px; padding:2px 6px; border-radius:5px; font-family:var(--mono);
  background:var(--surface-3); color:var(--text-muted); border:1px solid var(--border); }
.tag.hl { color:var(--axis-structure); border-color:color-mix(in srgb,var(--axis-structure) 35%,transparent); }
.tag.stale { color:var(--warning); border-color:color-mix(in srgb,var(--warning) 40%,transparent); }
.held-dot { color:var(--accent); font-size:10px; }

.score { display:flex; align-items:center; gap:7px; justify-content:flex-end; }
.score .bar { width:38px; height:4px; border-radius:2px; background:var(--surface-3);
  overflow:hidden; flex:none; }
.score .bar i { display:block; height:100%; border-radius:2px; }
.score .v { font-family:var(--mono); font-size:12px; min-width:30px; text-align:right; }

.grade { display:inline-block; min-width:32px; padding:3px 8px; border-radius:7px;
  font-family:var(--mono); font-size:11.5px; font-weight:650; text-align:center; border:1px solid; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:3.5px 10px;
  border-radius:999px; font-size:11px; font-weight:600; border:1px solid; white-space:nowrap; }
.badge::before { content:''; width:5px; height:5px; border-radius:50%;
  background:currentColor; flex:none; }
.b-buy { color:var(--good); border-color:color-mix(in srgb,var(--good) 40%,transparent); background:var(--good-dim); }
.b-sell { color:var(--critical); border-color:color-mix(in srgb,var(--critical) 40%,transparent); background:var(--critical-dim); }
.b-hold { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); background:var(--accent-dim); }
.b-neutral { color:var(--text-secondary); border-color:var(--border); background:var(--surface-2); }
.b-nodata { color:var(--text-muted); border-color:var(--border); background:transparent; }

.row-buy {
  padding:6px 16px; border-radius:999px; border:none; cursor:pointer;
  background:var(--good); color:#fff; font:600 12px var(--sans); transition:.15s;
}
.row-buy:hover { filter:brightness(1.12); }
.spark { display:block; }

/* ══ Weights ════════════════════════════════════════════════════════════ */
.weights { padding:16px 18px; display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.wrow .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.wrow .nm { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-secondary); }
.swatch { width:9px; height:9px; border-radius:3px; flex:none; }
.wrow .pct { font-family:var(--mono); font-size:12px; }
input[type=range] { width:100%; height:4px; -webkit-appearance:none; appearance:none;
  background:var(--surface-3); border-radius:2px; outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px;
  border-radius:50%; background:var(--accent); cursor:pointer;
  border:2.5px solid var(--surface-1); box-shadow:var(--shadow); }
input[type=range]::-moz-range-thumb { width:15px; height:15px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:2.5px solid var(--surface-1); }

/* ══ Portfolio ══════════════════════════════════════════════════════════ */
.hero { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.hero .big { font:650 36px/1 var(--mono); letter-spacing:-.02em; }
.hero .chg { font:500 15px var(--mono); }
.holds { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:12px; padding:16px; }
.hold { background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r); padding:15px; cursor:pointer; transition:.16s; }
.hold:hover { border-color:var(--border-bright); transform:translateY(-2px);
  box-shadow:var(--shadow-lg); }
.hold .top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:11px; }
.hold .tick { font-size:15px; font-weight:650; }
.hold .nm { font-size:11px; color:var(--text-muted); }
.hold .val { font:650 16px var(--mono); }
.hold .pnl { font:500 12px var(--mono); }
.hold .wbar { height:3px; background:var(--surface-3); border-radius:2px;
  overflow:hidden; margin:10px 0 8px; }
.hold .wbar i { display:block; height:100%; background:var(--accent); border-radius:2px; }
.hold .meta { display:flex; justify-content:space-between; font-size:11px;
  color:var(--text-muted); font-family:var(--mono); }

/* ══ Stat sub-page ══════════════════════════════════════════════════════ */
.stat-head { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.stat-head h2 { font-size:19px; font-weight:700; letter-spacing:-.02em; }
.stat-head .desc { width:100%; color:var(--text-secondary); font-size:13px; }
.minis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px; margin-top:16px; }

/* ══ Drawer ═════════════════════════════════════════════════════════════ */
.scrim { position:fixed; inset:0; background:rgba(4,10,18,.6); backdrop-filter:blur(3px);
  opacity:0; pointer-events:none; transition:.2s; z-index:90; }
.scrim.open { opacity:1; pointer-events:auto; }
.drawer { position:fixed; top:0; right:0; bottom:0; width:min(560px,100vw);
  background:var(--surface-1); border-left:1px solid var(--border);
  transform:translateX(100%); transition:transform .28s cubic-bezier(.22,1,.36,1);
  z-index:100; overflow-y:auto; }
.drawer.open { transform:none; }
.drawer-head { padding:20px 22px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--surface-1); z-index:2; }
.drawer-head .close { position:absolute; top:18px; right:19px; }
.dsec { padding:18px 22px; border-bottom:1px solid var(--border); }
.dsec h3 { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em;
  color:var(--text-muted); margin-bottom:12px; font-weight:650;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.dsec h3 .ranges { margin-left:auto; }
.kv { display:flex; justify-content:space-between; padding:5px 0; font-size:12.5px; }
.kv .k { color:var(--text-secondary); }
.kv .v { font-family:var(--mono); }
.axis-row { margin-bottom:13px; }
.axis-row .top { display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; }
.axis-row .track { height:6px; background:var(--surface-3); border-radius:3px; overflow:hidden; }
.axis-row .track i { display:block; height:100%; border-radius:3px; }
.chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip { font-size:11px; font-family:var(--mono); padding:3.5px 9px; border-radius:6px;
  background:var(--surface-2); border:1px solid var(--border); color:var(--text-secondary); }
.chip b { color:var(--text-primary); font-weight:600; }

/* ══ Trade widget ═══════════════════════════════════════════════════════ */
.trade { background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r); padding:16px; }
.side-toggle { display:grid; grid-template-columns:1fr 1fr; gap:4px;
  background:var(--surface-3); padding:4px; border-radius:999px; margin-bottom:14px; }
.side-toggle button { padding:9px; border:none; border-radius:999px; cursor:pointer;
  font:650 13px var(--sans); color:var(--text-secondary); background:transparent; transition:.15s; }
.side-toggle button.on[data-side="BUY"] { background:var(--good); color:#fff; }
.side-toggle button.on[data-side="SELL"] { background:var(--critical); color:#fff; }
.side-toggle button:disabled { opacity:.35; cursor:not-allowed; }
.amt-wrap { position:relative; margin-bottom:10px; }
.amt-wrap .pfx { position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text-muted); font:500 17px var(--mono); pointer-events:none; }
.amt { width:100%; padding:13px 13px 13px 32px; font:650 19px var(--mono);
  background:var(--surface-1); border:1.5px solid var(--border); border-radius:12px;
  color:var(--text-primary); outline:none; transition:.15s; }
.amt:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.amt::-webkit-outer-spin-button, .amt::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.amt[type=number] { -moz-appearance:textfield; }
.quick { display:flex; gap:6px; margin-bottom:13px; flex-wrap:wrap; }
.quick button { flex:1; min-width:54px; padding:7px 8px; border-radius:999px; cursor:pointer;
  background:var(--surface-1); border:1px solid var(--border); color:var(--text-secondary);
  font:500 11.5px var(--mono); transition:.15s; }
.quick button:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.quick button:disabled { opacity:.4; cursor:not-allowed; }
.preview { font-size:12px; color:var(--text-secondary); margin-bottom:13px; }
.preview .row { display:flex; justify-content:space-between; padding:3px 0; }
.preview .row b { font-family:var(--mono); color:var(--text-primary); font-weight:600; }
.preview .row.tot { border-top:1px solid var(--border); margin-top:5px; padding-top:7px; }
.submit { width:100%; padding:13px; border:none; border-radius:999px; cursor:pointer;
  font:650 14px var(--sans); color:#fff; transition:.15s; }
.submit.buy { background:var(--good); } .submit.sell { background:var(--critical); }
.submit:hover:not(:disabled) { filter:brightness(1.1); }
.submit:disabled { opacity:.4; cursor:not-allowed; }
.err { color:var(--critical); font-size:12px; margin-top:9px; text-align:center; min-height:16px; }

/* ══ Charts, toast, misc ════════════════════════════════════════════════ */
.chart { width:100%; display:block; }
.tip { position:fixed; pointer-events:none; z-index:200; opacity:0; transition:opacity .12s;
  background:var(--surface-3); border:1px solid var(--border-bright); border-radius:8px;
  padding:7px 10px; font-size:11.5px; font-family:var(--mono);
  box-shadow:var(--shadow-lg); white-space:nowrap; }
.tip.on { opacity:1; }
.toast { position:fixed; bottom:22px; left:50%; transform:translate(-50%,80px);
  background:var(--surface-3); border:1px solid var(--border-bright); border-radius:12px;
  padding:12px 18px; font-size:13px; z-index:300; opacity:0; transition:.25s;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; }
.toast.on { opacity:1; transform:translate(-50%,0); }
.toast .ic { width:7px; height:7px; border-radius:50%; flex:none; }
.toast.ok .ic { background:var(--good); } .toast.bad .ic { background:var(--critical); }
.empty { padding:36px; text-align:center; color:var(--text-muted); font-size:13px; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:var(--text-secondary); }
.legend span { display:flex; align-items:center; gap:5px; }

@media (max-width:760px) {
  .hide-sm { display:none !important; }
  main { padding:14px; }
  header { padding:11px 14px; }
  .brand .bt { font-size:12.5px; }
  .hero .big { font-size:28px; }
}

const LANG_NAMES = { en:"English", hy:"Հայերեն", uk:"Українська", es:"Español", el:"Ελληνικά" };
const LOCALES = { en:"en-US", hy:"hy-AM", uk:"uk-UA", es:"es-ES", el:"el-GR" };

let LANG = 'en';
function t(key, vars) {
  let s = (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
  if (vars) for (const [k, v] of Object.entries(vars)) s = s.replace('{' + k + '}', v);
  return s;
}
function applyStatic() {
  document.querySelectorAll('[data-i18n]').forEach(n => { n.textContent = t(n.dataset.i18n); });
}

/* ══ State & helpers ════════════════════════════════════════════════════ */
const AXES = [
  ['momentum','var(--axis-momentum)'],
  ['risk','var(--axis-risk)'],
  ['structure','var(--axis-structure)'],
  ['relative','var(--axis-relative)'],
];
const RANGE_KEYS = ['1h','24h','7d','30d','1y','all'];
const RANGE_LABEL = { '1h':'r1h','24h':'r24h','7d':'r7d','30d':'r30d','1y':'r1y','all':'rall' };

const S = {
  settings:null, assets:[], weights:null, defaults:null, thresholds:{},
  sort:{key:'composite',dir:-1}, view:'market', open:null, side:'BUY',
  manual:null, cycleSeconds:60, updatedAt:null, cycle:0,
  pfRange: localStorage.getItem('pfRange') || '24h',
  statMetric:null, statRange:'24h',
  drawerPriceRange:'24h', drawerScoreRange:'24h',
  histCache:{}, priceCache:{},
};

const $ = s => document.querySelector(s);
function money(v, dp) {
  if (v == null || !isFinite(v)) return '—';
  const a = Math.abs(v);
  if (dp == null) dp = a >= 1000 ? 2 : a >= 1 ? 3 : a >= 0.01 ? 4 : 6;
  return '$' + v.toLocaleString('en-US', { minimumFractionDigits:dp, maximumFractionDigits:dp });
}
function compact(v) {
  if (v == null || !isFinite(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
  if (a >= 1e9)  return '$' + (v/1e9).toFixed(2) + 'B';
  if (a >= 1e6)  return '$' + (v/1e6).toFixed(1) + 'M';
  if (a >= 1e3)  return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(2);
}
const pct = (v,dp=2) => v == null || !isFinite(v) ? '—' : (v>=0?'+':'') + v.toFixed(dp) + '%';
const num = (v,dp=1) => v == null || !isFinite(v) ? '—' : v.toFixed(dp);
const sgn = v => v == null ? '' : v > 0 ? 'pos' : v < 0 ? 'neg' : '';
const fmtDate = ts => new Date(ts).toLocaleString(LOCALES[LANG] || 'en-US',
  { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

function scoreColor(v) {
  if (v == null) return 'var(--text-muted)';
  if (v >= 70) return 'var(--good)';
  if (v >= 55) return 'var(--accent)';
  if (v >= 45) return 'var(--warning)';
  return 'var(--critical)';
}
function gradeStyle(g) {
  const c = !g || g === '-' ? 'var(--text-muted)'
    : g[0] === 'A' ? 'var(--good)' : g[0] === 'B' ? 'var(--accent)'
    : g[0] === 'C' ? 'var(--warning)' : 'var(--critical)';
  return `color:${c};border-color:color-mix(in srgb,${c} 38%,transparent);background:color-mix(in srgb,${c} 10%,transparent)`;
}
function badgeClass(sig) {
  if (!sig || sig === 'NO DATA') return 'b-nodata';
  if (sig.includes('BUY')) return 'b-buy';
  if (sig.includes('SELL')) return 'b-sell';
  if (sig === 'HOLD') return 'b-hold';
  return 'b-neutral';
}
const sigLabel = sig => !sig ? '—' : t('sig' + sig.replace(/\s/g, ''));
function ago(ts) {
  if (!ts) return '';
  const s = Math.max(0, Math.round((Date.now() - ts) / 1000));
  return s < 60 ? s + 's' : s < 3600 ? Math.floor(s/60) + 'm' : Math.floor(s/3600) + 'h';
}
function toast(msg, ok = true) {
  const el = $('#toast');
  $('#toastMsg').innerHTML = msg;
  el.className = 'toast on ' + (ok ? 'ok' : 'bad');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.className = 'toast ' + (ok ? 'ok' : 'bad'), 3600);
}
async function api(path, opts) {
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || t('errGeneric'));
  return d;
}

/* Client-side recomposition — mirrors composite_score() in analytics/rating.py. */
function composite(a, w) {
  let sum = 0, tw = 0;
  for (const [k] of AXES) { if (a[k] == null) continue; sum += a[k] * w[k]; tw += w[k]; }
  return tw > 0 ? sum / tw : null;
}
const GRADES = [[90,'A+'],[85,'A'],[80,'A-'],[75,'B+'],[70,'B'],[65,'B-'],
                [60,'C+'],[55,'C'],[50,'C-'],[45,'D+'],[40,'D'],[35,'D-'],[0,'F']];
const gradeFor = v => (GRADES.find(([c]) => v >= c) || [0,'F'])[1];

/* ══ Range pills ════════════════════════════════════════════════════════ */
function rangePills(active, onPick) {
  const box = document.createElement('div');
  box.className = 'ranges';
  for (const k of RANGE_KEYS) {
    const b = document.createElement('button');
    b.textContent = t(RANGE_LABEL[k]);
    if (k === active) b.classList.add('on');
    b.addEventListener('click', () => onPick(k));
    box.appendChild(b);
  }
  return box;
}

/* ══ Charts ═════════════════════════════════════════════════════════════ */
function sparkline(vals, w=64, h=20) {
  if (!vals || vals.length < 2) return '';
  const lo = Math.min(...vals), hi = Math.max(...vals), span = hi - lo || 1;
  const pts = vals.map((v,i) => [ (i/(vals.length-1))*w, h-2-((v-lo)/span)*(h-4) ]);
  const d = pts.map((p,i) => (i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const up = vals[vals.length-1] >= vals[0];
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <path d="${d}" fill="none" stroke="${up?'var(--good)':'var(--critical)'}" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round" opacity=".9"/></svg>`;
}

function lineChart(sel, vals, opt = {}) {
  const svg = typeof sel === 'string' ? $(sel) : sel;
  if (!svg) return;
  const H = +svg.getAttribute('height');
  if (!vals || vals.length < 2) {
    svg.innerHTML = `<text x="10" y="26" font-size="11.5" fill="var(--text-muted)">${t('notEnoughHistory')}</text>`;
    return;
  }
  const W = svg.clientWidth || 480;
  const P = { t:10, r:8, b:18, l:52 };
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if (opt.lines) { lo = Math.min(lo, ...opt.lines.map(l => l.v)); hi = Math.max(hi, ...opt.lines.map(l => l.v)); }
  const pad = (hi - lo) * 0.06 || Math.abs(hi) * 0.01 || 1;
  lo -= pad; hi += pad;
  const span = hi - lo || 1;
  const x = i => P.l + (i/(vals.length-1)) * (W-P.l-P.r);
  const y = v => P.t + (1-(v-lo)/span) * (H-P.t-P.b);
  const fmt = opt.fmt || (v => v.toFixed(2));
  const axFmt = v => Math.abs(v) >= 1e6 ? (v/1e6).toFixed(1)+'M'
    : Math.abs(v) >= 1000 ? (v/1000).toFixed(1) + 'k'
    : Math.abs(v) >= 1 ? v.toFixed(Math.abs(v) >= 100 ? 0 : 2) : v.toFixed(4);

  let g = '';
  for (let i = 0; i <= 3; i++) {
    const v = lo + span*i/3, yy = y(v);
    g += `<line x1="${P.l}" y1="${yy}" x2="${W-P.r}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>
          <text x="${P.l-7}" y="${yy+3.5}" text-anchor="end" font-size="9.5"
            fill="var(--text-muted)" font-family="var(--mono)">${axFmt(v)}</text>`;
  }
  for (const l of opt.lines || []) {
    g += `<line x1="${P.l}" y1="${y(l.v)}" x2="${W-P.r}" y2="${y(l.v)}" stroke="${l.color}"
      stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>`;
  }
  const d = vals.map((v,i) => (i?'L':'M') + x(i).toFixed(1) + ' ' + y(v).toFixed(1)).join(' ');
  const c = opt.color || 'var(--accent)';
  const gid = 'g' + Math.random().toString(36).slice(2, 8);
  const area = `${d} L ${x(vals.length-1).toFixed(1)} ${H-P.b} L ${x(0).toFixed(1)} ${H-P.b} Z`;

  svg.innerHTML = `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
    ${g}${opt.fill ? `<path d="${area}" fill="url(#${gid})"/>` : ''}
    <path d="${d}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <line class="ch-cross" y1="${P.t}" y2="${H-P.b}" stroke="var(--border-bright)" stroke-width="1" opacity="0"/>
    <circle class="ch-dot" r="3.5" fill="${c}" stroke="var(--surface-1)" stroke-width="2" opacity="0"/>
    <rect x="${P.l}" y="0" width="${W-P.l-P.r}" height="${H}" fill="transparent" class="ch-hit"/>`;

  const cross = svg.querySelector('.ch-cross'), dot = svg.querySelector('.ch-dot');
  const tip = $('#tip');
  svg.querySelector('.ch-hit').addEventListener('mousemove', e => {
    const r = svg.getBoundingClientRect();
    const i = Math.round(((e.clientX - r.left - P.l) / (W-P.l-P.r)) * (vals.length-1));
    if (i < 0 || i >= vals.length) return;
    cross.setAttribute('x1', x(i)); cross.setAttribute('x2', x(i)); cross.setAttribute('opacity','1');
    dot.setAttribute('cx', x(i)); dot.setAttribute('cy', y(vals[i])); dot.setAttribute('opacity','1');
    tip.classList.add('on');
    tip.style.left = Math.min(e.clientX + 12, innerWidth - 170) + 'px';
    tip.style.top = (e.clientY - 36) + 'px';
    const when = opt.labels ? fmtDate(opt.labels[i]) : '';
    tip.innerHTML = `${fmt(vals[i])}${when ? `<br><span style="color:var(--text-muted)">${when}</span>` : ''}`;
  });
  svg.addEventListener('mouseleave', () => {
    cross.setAttribute('opacity','0'); dot.setAttribute('opacity','0'); tip.classList.remove('on');
  });
}

/* ══ Landing ════════════════════════════════════════════════════════════ */
const Landing = {
  followed: new Set(), capital: 100000,

  // Reads saved settings exactly once per visit to the start screen. render()
  // must never re-read them: it re-runs on every language switch and after
  // Select All / Clear, and re-reading would silently revert those choices.
  show() {
    const s = S.settings;
    this.followed = new Set(s.followed);
    this.capital = s.starting_capital;
    this.render();
  },

  render() {
    const s = S.settings;

    const lr = $('#langRow'); lr.innerHTML = '';
    for (const code of s.languages) {
      const b = document.createElement('button');
      b.className = 'lang-pill' + (code === LANG ? ' on' : '');
      b.textContent = LANG_NAMES[code] || code;
      b.addEventListener('click', () => { setLang(code); this.render(); });
      lr.appendChild(b);
    }

    const grid = $('#coinGrid'); grid.innerHTML = '';
    for (const a of s.all_assets) {
      const row = document.createElement('label');
      row.className = 'coin-row' + (this.followed.has(a.symbol) ? ' on' : '');
      row.innerHTML = `
        <div class="ct"><div class="cs">${a.symbol}</div><div class="cn">${a.name}</div></div>
        <span class="sw"><input type="checkbox" ${this.followed.has(a.symbol) ? 'checked' : ''}>
        <span class="tr"></span></span>`;
      row.querySelector('input').addEventListener('change', e => {
        e.target.checked ? this.followed.add(a.symbol) : this.followed.delete(a.symbol);
        row.classList.toggle('on', e.target.checked);
        this.count();
      });
      grid.appendChild(row);
    }
    this.count();

    $('#capInput').value = this.capital;
    $('#capInput').oninput = e => {
      const v = parseFloat(e.target.value);
      if (isFinite(v)) this.capital = v;
    };
    const chips = $('#capChips'); chips.innerHTML = '';
    for (const v of [10000, 25000, 50000, 100000, 250000, 1000000]) {
      const b = document.createElement('button');
      b.textContent = v >= 1e6 ? '$' + v/1e6 + 'M' : '$' + v/1e3 + 'K';
      b.addEventListener('click', () => { $('#capInput').value = v; this.capital = v; });
      chips.appendChild(b);
    }

    $('#landGo').textContent = s.initialized ? t('enter') : t('launch');
    $('#landErr').textContent = '';
    applyStatic();
  },

  count() {
    $('#coinCount').textContent =
      t('selectedOf', { n:this.followed.size, m:S.settings.all_assets.length });
  },

  async submit() {
    const err = $('#landErr');
    err.textContent = '';
    if (this.followed.size === 0) { err.textContent = t('needOne'); return; }
    const cap = parseFloat($('#capInput').value);
    if (!isFinite(cap) || cap < S.settings.capital_min || cap > S.settings.capital_max) {
      err.textContent = t('capRange',
        { lo:money(S.settings.capital_min,0), hi:money(S.settings.capital_max,0) });
      return;
    }
    try {
      const d = await api('/api/settings', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ language:LANG, followed:[...this.followed], starting_capital:cap }),
      });
      S.settings = { ...S.settings, ...d.settings };
      if (d.portfolio_reset) S.histCache = {};
    } catch (e) { err.textContent = e.message; return; }
    enterApp();
  },
};

function showLanding() {
  $('#landing').classList.remove('hide', 'leaving');
  Landing.show();
}
function enterApp() {
  $('#landing').classList.add('leaving');
  setTimeout(() => $('#landing').classList.add('hide'), 460);
  $('#app').classList.remove('hide');
  requestAnimationFrame(() => $('#app').classList.add('ready'));
  refresh();
}

/* ══ Markets ════════════════════════════════════════════════════════════ */
function followedAssets() { return S.assets.filter(a => a.followed); }

function renderWeights() {
  const box = $('#weights'); box.innerHTML = '';
  for (const [k, color] of AXES) {
    const row = document.createElement('div');
    row.className = 'wrow';
    row.innerHTML = `
      <div class="top">
        <span class="nm"><i class="swatch" style="background:${color}"></i>${t(k)}</span>
        <span class="pct" id="w-${k}">${Math.round(S.weights[k]*100)}%</span>
      </div>
      <input type="range" min="0" max="100" step="1" value="${Math.round(S.weights[k]*100)}" data-k="${k}">`;
    row.querySelector('input').addEventListener('input', e => {
      S.weights[e.target.dataset.k] = +e.target.value / 100;
      $('#w-' + e.target.dataset.k).textContent = e.target.value + '%';
      renderGrid();
    });
    box.appendChild(row);
  }
  $('#axisLegend').innerHTML = AXES.map(([k, c]) =>
    `<span><i class="swatch" style="background:${c}"></i>${t(k)}</span>`).join('');
}

function sorted(rows) {
  const { key, dir } = S.sort;
  return [...rows].sort((a, b) => {
    let x = a[key], y = b[key];
    if (key === 'composite') { x = a._c; y = b._c; }
    if (x == null) return 1; if (y == null) return -1;
    if (typeof x === 'string') return x.localeCompare(y) * dir;
    return (x - y) * dir;
  });
}

function renderGrid() {
  const wsum = AXES.reduce((s, [k]) => s + S.weights[k], 0) || 1;
  const w = {}; for (const [k] of AXES) w[k] = S.weights[k] / wsum;
  for (const a of S.assets) { a._c = composite(a, w); a._g = a._c == null ? '-' : gradeFor(a._c); }

  const body = $('#gridBody'); body.innerHTML = '';
  for (const a of sorted(followedAssets())) {
    const tr = document.createElement('tr');
    tr.addEventListener('click', () => { S.side = 'BUY'; openDrawer(a.symbol); });

    const scoreCell = k => {
      const v = a[k];
      const c = AXES.find(x => x[0] === k)[1];
      return `<td class="hide-sm"><div class="score">
        <span class="bar"><i style="width:${v==null?0:v}%;background:${c}"></i></span>
        <span class="v">${num(v,0)}</span></div></td>`;
    };

    tr.innerHTML = `
      <td class="l"><div class="sym">
        <div>
          <div class="tick">${a.symbol}${a.held ? ' <span class="held-dot">●</span>' : ''}</div>
          <div class="nm">${a.name}</div>
        </div>
        ${a.source === 'hyperliquid' ? '<span class="tag hl">HL</span>' : ''}
        ${a.stale ? '<span class="tag stale">' + t('noData').toUpperCase() + '</span>' : ''}
      </div></td>
      <td class="hide-sm">${sparkline(a.spark)}</td>
      <td class="num">${money(a.price)}</td>
      <td class="num ${sgn(a.chg_24h)}">${pct(a.chg_24h)}</td>
      ${scoreCell('momentum')}${scoreCell('risk')}${scoreCell('structure')}${scoreCell('relative')}
      <td><div class="score">
        <span class="bar"><i style="width:${a._c==null?0:a._c}%;background:${scoreColor(a._c)}"></i></span>
        <span class="v" style="font-weight:600">${num(a._c)}</span></div></td>
      <td><span class="grade" style="${gradeStyle(a._g)}">${a._g}</span></td>
      <td><span class="badge ${badgeClass(a.signal)}">${sigLabel(a.signal)}</span></td>
      <td><button class="row-buy">${t('buy')}</button></td>`;
    tr.querySelector('.row-buy').addEventListener('click', e => {
      e.stopPropagation(); S.side = 'BUY'; openDrawer(a.symbol);
    });
    body.appendChild(tr);
  }

  document.querySelectorAll('#grid thead th').forEach(th => {
    const arrow = th.querySelector('.arrow');
    if (arrow) arrow.textContent = th.dataset.k === S.sort.key ? (S.sort.dir < 0 ? '▼' : '▲') : '';
  });
}

function renderMarketTiles() {
  const rows = followedAssets();
  const rated = rows.filter(a => a._c != null);
  const buys = rows.filter(a => (a.signal || '').includes('BUY')).length;
  const sells = rows.filter(a => (a.signal || '').includes('SELL')).length;
  const avg = rated.length ? rated.reduce((s, a) => s + a._c, 0) / rated.length : null;
  const best = rated.length ? rated.reduce((m, a) => a._c > m._c ? a : m) : null;
  const up = rows.filter(a => (a.chg_24h || 0) > 0).length;

  $('#marketTiles').innerHTML = `
    <div class="tile"><div class="label">${t('marketAvg')}</div>
      <div class="value num" style="color:${scoreColor(avg)}">${num(avg)}</div>
      <div class="meta">${rated.length} ${t('of')} ${rows.length} ${t('rated')}</div></div>
    <div class="tile"><div class="label">${t('topRated')}</div>
      <div class="value">${best ? best.symbol : '—'}</div>
      <div class="meta num">${best ? num(best._c) + ' · ' + best._g : ''}</div></div>
    <div class="tile"><div class="label">${t('buySignals')}</div>
      <div class="value" style="color:var(--good)">${buys}</div>
      <div class="meta">${t('sellSignalsMeta', { n:sells })}</div></div>
    <div class="tile"><div class="label">${t('advancing')}</div>
      <div class="value">${up}<span style="font-size:14px;color:var(--text-muted)">/${rows.length}</span></div>
      <div class="meta">${t('onChg')}</div></div>`;
}

/* ══ Drawer & trading ═══════════════════════════════════════════════════ */
function tradeWidget(symbol) {
  const a = S.assets.find(x => x.symbol === symbol);
  const m = S.manual;
  const held = m?.holdings.find(h => h.symbol === symbol);
  const cash = m?.cash ?? 0;
  if (S.side === 'SELL' && !held) S.side = 'BUY';
  const buying = S.side === 'BUY';

  return `<div class="trade">
    <div class="side-toggle">
      <button data-side="BUY" class="${buying?'on':''}">${t('buy')}</button>
      <button data-side="SELL" class="${!buying?'on':''}" ${held?'':'disabled'}>${t('sell')}</button>
    </div>
    <div class="amt-wrap">
      <span class="pfx">${buying?'$':'⊙'}</span>
      <input class="amt" id="amt" type="number" min="0" step="any"
             placeholder="${buying?'0.00':'0.000000'}" autocomplete="off">
    </div>
    <div class="quick" id="quick">
      ${buying
        ? `<button data-usd="100" ${100>cash?'disabled':''}>$100</button>
           <button data-usd="1000" ${1000>cash?'disabled':''}>$1K</button>
           <button data-frac-cash="0.25">25%</button>
           <button data-frac-cash="0.5">50%</button>
           <button data-usd="max">${t('max')}</button>`
        : [25,50,75,100].map(v => `<button data-frac="${v/100}">${v}%</button>`).join('')}
    </div>
    <div class="preview" id="preview"></div>
    <button class="submit ${buying?'buy':'sell'}" id="submitTrade" disabled>
      ${buying?t('buy'):t('sell')} ${symbol}</button>
    <div class="err" id="tradeErr"></div>
    <div class="preview" style="margin:11px 0 0;border-top:1px solid var(--border);padding-top:10px">
      <div class="row"><span>${t('available')}</span><b>${money(cash,2)}</b></div>
      ${held ? `<div class="row"><span>${t('youHold')}</span><b>${held.qty.toFixed(6)} ${symbol}</b></div>
        <div class="row"><span>${t('avgCost')}</span><b>${money(held.avg_cost)}</b></div>
        <div class="row"><span>${t('unrealized')}</span><b class="${sgn(held.unrealized_pnl)}">${money(held.unrealized_pnl,2)} (${pct(held.unrealized_pct)})</b></div>`
        : `<div class="row"><span>${t('youHold')}</span><b>${t('none')}</b></div>`}
    </div>
  </div>`;
}

function wireTrade(symbol) {
  const a = S.assets.find(x => x.symbol === symbol);
  const price = a?.price;
  const m = S.manual;
  const held = m?.holdings.find(h => h.symbol === symbol);
  const cash = m?.cash ?? 0;
  const fee = m?.fee_rate ?? 0.001;
  const amt = $('#amt'), prev = $('#preview'), sub = $('#submitTrade'), err = $('#tradeErr');
  if (!amt) return;

  function update() {
    const v = parseFloat(amt.value);
    err.textContent = '';
    if (!v || v <= 0 || !price) { prev.innerHTML = ''; sub.disabled = true; return; }
    if (S.side === 'BUY') {
      const gross = v / (1 + fee), qty = gross / price, f = gross * fee;
      prev.innerHTML = `
        <div class="row"><span>${t('price')}</span><b>${money(price)}</b></div>
        <div class="row"><span>${t('youReceive')}</span><b>${qty.toFixed(6)} ${symbol}</b></div>
        <div class="row"><span>${t('fee')} (${(fee*100).toFixed(2)}%)</span><b>${money(f,2)}</b></div>
        <div class="row tot"><span>${t('totalCost')}</span><b>${money(v,2)}</b></div>`;
      const over = v > cash + 1e-6;
      sub.disabled = over;
      if (over) err.textContent = t('exceedsCash', { amt:money(cash,2) });
    } else {
      const qty = v, gross = qty * price, f = gross * fee;
      const basis = held ? qty * held.avg_cost : 0;
      const pnl = gross - f - basis;
      prev.innerHTML = `
        <div class="row"><span>${t('price')}</span><b>${money(price)}</b></div>
        <div class="row"><span>${t('value')}</span><b>${money(gross,2)}</b></div>
        <div class="row"><span>${t('fee')} (${(fee*100).toFixed(2)}%)</span><b>${money(f,2)}</b></div>
        <div class="row tot"><span>${t('youReceive')}</span><b>${money(gross-f,2)}</b></div>
        <div class="row"><span>${t('realizedPnl')}</span><b class="${sgn(pnl)}">${money(pnl,2)}</b></div>`;
      const over = !held || qty > held.qty + 1e-9;
      sub.disabled = over;
      if (over) err.textContent = held ? t('onlyHold', { qty:held.qty.toFixed(6) }) : t('nothingToSell');
    }
  }
  amt.addEventListener('input', update);

  document.querySelectorAll('.side-toggle button').forEach(b => {
    b.addEventListener('click', () => {
      if (b.disabled) return;
      S.side = b.dataset.side;
      openDrawer(symbol);
    });
  });

  $('#quick')?.addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b || b.disabled) return;
    if (b.dataset.usd) amt.value = b.dataset.usd === 'max' ? cash.toFixed(2) : b.dataset.usd;
    else if (b.dataset.fracCash) amt.value = (cash * parseFloat(b.dataset.fracCash)).toFixed(2);
    else if (b.dataset.frac && held) {
      const f = parseFloat(b.dataset.frac);
      amt.value = f === 1 ? held.qty : +(held.qty * f).toFixed(8);
    }
    update();
  });

  sub.addEventListener('click', async () => {
    const v = parseFloat(amt.value);
    if (!v || v <= 0) return;
    sub.disabled = true; sub.textContent = t('working');
    const body = S.side === 'BUY'
      ? { symbol, side:'BUY', usd:v } : { symbol, side:'SELL', qty:v };
    try {
      const d = await api('/api/manual/trade', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body),
      });
      S.manual = d.portfolio;
      S.histCache = {};
      const tr = d.trade;
      toast(`${S.side === 'BUY' ? t('buy') : t('sell')} <b>${tr.qty.toFixed(6)} ${symbol}</b> @ ${money(tr.price)}` +
        (tr.pnl != null ? ` · <b class="${sgn(tr.pnl)}">${money(tr.pnl,2)}</b>` : ''), true);
      const held = S.manual.holdings.find(h => h.symbol === symbol);
      for (const x of S.assets) if (x.symbol === symbol) x.held = !!held;
      renderGrid();
      if (S.view === 'portfolio') renderPortfolio();
      openDrawer(symbol);
    } catch (e) {
      err.textContent = e.message;
      toast(e.message, false);
      sub.disabled = false;
      sub.textContent = `${S.side === 'BUY' ? t('buy') : t('sell')} ${symbol}`;
    }
  });
  update();
}

async function drawPriceChart(symbol) {
  const key = symbol + ':' + S.drawerPriceRange;
  let d = S.priceCache[key];
  if (!d) {
    try { d = await api(`/api/asset/${symbol}/prices?range=${S.drawerPriceRange}`); }
    catch { return; }
    S.priceCache[key] = d;
  }
  const svg = $('#priceChart'); if (!svg) return;
  lineChart(svg, d.points.map(p => p.p),
    { color:'var(--accent)', fill:true, labels:d.points.map(p => p.t), fmt:money });
  const meta = $('#priceMeta');
  if (meta) meta.innerHTML =
    `<span class="${sgn(d.change_pct)}">${pct(d.change_pct)}</span>
     <span style="color:var(--text-muted)"> · ${t('high')} ${money(d.high)} · ${t('low')} ${money(d.low)}</span>`;
}

async function drawScoreChart(symbol) {
  let d;
  try { d = await api(`/api/asset/${symbol}/ratings?range=${S.drawerScoreRange}`); }
  catch { return; }
  const svg = $('#histChart'); if (!svg) return;
  const pts = d.points.filter(p => p.v != null);
  lineChart(svg, pts.map(p => p.v), {
    color:'var(--accent)', labels:pts.map(p => p.t), fmt:v => v.toFixed(1),
    lines:[ { v:S.thresholds.buy, color:'var(--good)' },
            { v:S.thresholds.exit, color:'var(--critical)' } ],
  });
}

async function openDrawer(symbol) {
  S.open = symbol;
  const d = $('#drawer');
  d.classList.add('open'); $('#scrim').classList.add('open');

  let data;
  try { data = await api('/api/asset/' + symbol); }
  catch { d.innerHTML = `<div class="empty">${t('errGeneric')}</div>`; return; }

  const a = S.assets.find(x => x.symbol === symbol) || {};
  const det = data.detail || {};
  const chips = o => Object.entries(o || {})
    .map(([k, v]) => `<span class="chip">${k.replace(/_/g,' ')} <b>${
      typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(2)) : v}</b></span>`).join('')
    || `<span class="chip">${t('noData')}</span>`;

  const axisRows = AXES.map(([k, color]) => `
    <div class="axis-row">
      <div class="top"><span style="color:var(--text-secondary)">${t(k)}</span>
        <span class="num">${num(a[k])}</span></div>
      <div class="track"><i style="width:${a[k]==null?0:a[k]}%;background:${color}"></i></div>
    </div>`).join('');

  d.innerHTML = `
    <div class="drawer-head">
      <button class="btn close" id="closeDrawer">✕</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
        <span style="font-size:20px;font-weight:650">${symbol}</span>
        <span class="grade" style="${gradeStyle(a._g)}">${a._g||'-'}</span>
        <span class="badge ${badgeClass(a.signal)}">${sigLabel(a.signal)}</span>
      </div>
      <div style="color:var(--text-secondary);font-size:12.5px">${data.name} — ${data.thesis}</div>
      <div style="margin-top:11px;display:flex;gap:18px;align-items:baseline">
        <span class="num" style="font-size:22px;font-weight:650">${money(a.price)}</span>
        <span class="num ${sgn(a.chg_24h)}" style="font-size:14px">${pct(a.chg_24h)}</span>
        <span class="num" style="font-size:12px;color:var(--text-muted)">${t('score')} ${num(a._c)}</span>
      </div>
    </div>

    <div class="dsec"><h3>${t('tradeTitle')}</h3>${tradeWidget(symbol)}</div>

    <div class="dsec"><h3>${t('priceHistory')}<span id="drawerPriceRanges" class="ranges-slot"></span></h3>
      <div style="font-size:11.5px;font-family:var(--mono);margin-bottom:8px" id="priceMeta"></div>
      <svg id="priceChart" class="chart" height="150"></svg></div>

    <div class="dsec"><h3>${t('ratingBreakdown')}</h3>${axisRows}</div>

    <div class="dsec"><h3>${t('scoreHistory')}<span id="drawerScoreRanges" class="ranges-slot"></span></h3>
      <svg id="histChart" class="chart" height="130"></svg>
      <div class="legend" style="margin-top:9px">
        <span><i class="swatch" style="background:var(--accent)"></i>${t('composite')}</span>
        <span style="color:var(--text-muted)">${t('buyThreshold',{v:S.thresholds.buy})} · ${t('exitThreshold',{v:S.thresholds.exit})}</span>
      </div></div>

    <div class="dsec"><h3>${t('momentumDetails')}</h3><div class="chips">${chips(det.momentum)}</div></div>
    <div class="dsec"><h3>${t('riskDetails')}</h3><div class="chips">${chips(det.risk)}</div></div>
    <div class="dsec"><h3>${t('structureDetails')}</h3><div class="chips">${chips(det.structure)}</div></div>
    <div class="dsec"><h3>${t('relativeDetails')}</h3><div class="chips">${chips(det.relative)}</div></div>
    <div class="dsec"><h3>${t('reference')}</h3>
      <div class="kv"><span class="k">${t('marketCap')}</span><span class="v">${compact(a.mcap)}</span></div>
      <div class="kv"><span class="k">${t('basketRank')}</span><span class="v">#${a.rank||'—'}</span></div>
      <div class="kv"><span class="k">${t('priceSource')}</span><span class="v">${data.source}</span></div>
    </div>`;

  $('#closeDrawer').addEventListener('click', closeDrawer);
  $('#drawerPriceRanges').replaceWith(
    Object.assign(rangePills(S.drawerPriceRange, k => {
      S.drawerPriceRange = k; drawPriceChart(symbol);
      openDrawerRangesRefresh('#priceRangesBox', k);
    }), { id:'priceRangesBox' }));
  $('#drawerScoreRanges').replaceWith(
    Object.assign(rangePills(S.drawerScoreRange, k => {
      S.drawerScoreRange = k; drawScoreChart(symbol);

  wireTrade(symbol);

function openDrawerRangesRefresh(sel, active) {
  const box = $(sel); if (!box) return;
  [...box.children].forEach(b => b.classList.toggle('on', b.textContent === t(RANGE_LABEL[active])));
}
function closeDrawer() {
  S.open = null;
  $('#drawer').classList.remove('open');
  $('#scrim').classList.remove('open');
}

/* ══ Portfolio ══════════════════════════════════════════════════════════ */
const METRICS = {
  cash:       { label:'cash',       desc:'descCash',       fmt:v => money(v,2), get:r => r.cash },
  invested:   { label:'invested',   desc:'descInvested',   fmt:v => money(v,2), get:r => r.market_value },
  unrealized: { label:'unrealized', desc:'descUnrealized', fmt:v => money(v,2), get:r => r.market_value - r.invested },
  realized:   { label:'realized',   desc:'descRealized',   fmt:v => money(v,2), get:r => r.realized },
  fees:       { label:'fees',       desc:'descFees',       fmt:v => money(v,2), get:r => r.fees },
};

async function histFor(range) {
  if (!S.histCache[range]) {
    S.histCache[range] = api(`/api/manual/history?range=${range}`).catch(() => ({ points:[] }));
  }
  return S.histCache[range];
}

async function loadManual() {
  try { S.manual = await api('/api/manual'); } catch { return; }
  if (S.view === 'portfolio') renderPortfolio();
}

function markToMarket(m) {
  for (const h of m.holdings) {
    const a = S.assets.find(x => x.symbol === h.symbol);
    if (a?.price) {
      h.price = a.price;
      h.value = h.qty * a.price;
      h.unrealized_pnl = h.value - h.cost_basis;
      h.unrealized_pct = h.cost_basis ? (h.value / h.cost_basis - 1) * 100 : 0;
    }
  }
}

async function renderPortfolio() {
  const m = S.manual; if (!m) return;
  markToMarket(m);
  const mv = m.holdings.reduce((s, h) => s + h.value, 0);
  const total = m.cash + mv;
  const pnl = total - m.starting_capital;
  const retPct = m.starting_capital ? (total / m.starting_capital - 1) * 100 : 0;

  $('#feeNote').textContent = t('feePerTrade', { fee:(m.fee_rate*100).toFixed(2) + '%' });
  $('#mTotal').textContent = money(total, 2);
  $('#mChange').innerHTML = `<span class="${sgn(pnl)}">${money(pnl,2)} (${pct(retPct)})</span>`;

  const pr = $('#pfRanges'); pr.innerHTML = '';
  pr.appendChild(rangePills(S.pfRange, k => {
    S.pfRange = k; localStorage.setItem('pfRange', k); renderPortfolio();
  }));
  const hist = await histFor(S.pfRange);
  lineChart('#pfChart', hist.points.map(p => p.total),
    { color:'var(--accent)', fill:true, labels:hist.points.map(p => p.ts), fmt:v => money(v,2) });

  const tiles = [
    ['cash', money(m.cash, 2), (total ? (m.cash/total*100).toFixed(0) : 0) + '% ' + t('ofPortfolio')],
    ['invested', money(mv, 2), t('holdingsCount', { n:m.holdings.length })],
    ['unrealized', money(mv - m.invested, 2), ''],
    ['realized', money(m.realized_pnl, 2),
      t('sellsCount', { n:m.closed_count }) + (m.closed_count ? ' · ' + t('winRate') + ' ' + m.win_rate.toFixed(0) + '%' : '')],
    ['fees', money(m.fees_paid, 2), t('tradesCount', { n:m.trade_count })],
  ];
  $('#mTiles').innerHTML = tiles.map(([k, v, meta]) => {
    const cls = k === 'unrealized' ? sgn(mv - m.invested) : k === 'realized' ? sgn(m.realized_pnl) : '';
    return `<div class="tile click" data-metric="${k}">
      <div class="label">${t(k)}</div>
      <div class="value num ${cls}" style="font-size:19px">${v}</div>
      <div class="meta">${meta}</div></div>`;
  }).join('');
  document.querySelectorAll('#mTiles .tile').forEach(el =>
    el.addEventListener('click', () => openStat(el.dataset.metric)));

  $('#mHoldings').innerHTML = m.holdings.length ? `<div class="holds">${
    m.holdings.map(h => `
      <div class="hold" data-sym="${h.symbol}">
        <div class="top">
          <div><div class="tick">${h.symbol}</div><div class="nm">${h.name}</div></div>
          <div style="text-align:right">
            <div class="val">${money(h.value,2)}</div>
            <div class="pnl ${sgn(h.unrealized_pnl)}">${money(h.unrealized_pnl,2)} (${pct(h.unrealized_pct)})</div>
          </div>
        </div>
        <div class="wbar"><i style="width:${Math.min(100,(h.value/(total||1)*100)).toFixed(1)}%"></i></div>
        <div class="meta">
          <span>${h.qty.toFixed(6)} @ ${money(h.avg_cost)}</span>
          <span>${(h.value/(total||1)*100).toFixed(1)}%</span>
        </div>
      </div>`).join('')}</div>`
    : `<div class="empty">${t('emptyHoldings')}</div>`;
  document.querySelectorAll('.hold').forEach(c =>
    c.addEventListener('click', () => { S.side = 'SELL'; openDrawer(c.dataset.sym); }));

  $('#mTrades').innerHTML = m.trades.length ? m.trades.map(x => `
    <tr><td class="l num" style="font-size:11.5px;color:var(--text-secondary)">${fmtDate(x.ts)}</td>
      <td class="l" style="font-weight:600">${x.symbol}</td>
      <td class="l"><span class="badge ${x.side==='BUY'?'b-buy':'b-sell'}">${x.side==='BUY'?t('buy'):t('sell')}</span></td>
      <td class="num">${x.qty.toFixed(6)}</td>
      <td class="num">${money(x.price)}</td>
      <td class="num">${money(x.value,2)}</td>
      <td class="num" style="color:var(--text-muted)">${money(x.fee,2)}</td>
      <td class="num ${sgn(x.pnl)}">${x.pnl==null?'—':money(x.pnl,2)+' ('+pct(x.pnl_pct)+')'}</td>
    </tr>`).join('') : `<tr><td colspan="8" class="empty">${t('emptyTrades')}</td></tr>`;
}

/* ══ Stat sub-page ══════════════════════════════════════════════════════ */
async function openStat(metric) {
  S.statMetric = metric;
  setView('stat');
  const M = METRICS[metric];
  $('#statTitle').textContent = t(M.label);
  $('#statDesc').textContent = t(M.desc, { fee:((S.manual?.fee_rate ?? 0.001)*100).toFixed(2) + '%' });
  const box = $('#statRanges'); box.innerHTML = '';
  box.appendChild(rangePills(S.statRange, k => { S.statRange = k; openStat(metric); }));
  await drawStat();
}

async function drawStat() {
  const M = METRICS[S.statMetric]; if (!M) return;
  const hist = await histFor(S.statRange);
  const vals = hist.points.map(M.get);
  lineChart('#statChart', vals,
    { color:'var(--accent)', fill:true, labels:hist.points.map(p => p.ts), fmt:M.fmt });
  const now = vals.length ? vals[vals.length-1] : null;
  const first = vals.length ? vals[0] : null;
  $('#statNow').textContent = now == null ? '—' : M.fmt(now);
  const delta = now != null && first != null ? now - first : null;
  $('#statChg').innerHTML = delta == null ? '' :
    `<span class="${sgn(delta)}">${(delta >= 0 ? '+' : '') + M.fmt(delta).replace('$-','-$')}</span>`;
  $('#statHigh').textContent = vals.length ? M.fmt(Math.max(...vals)) : '—';
  $('#statLow').textContent = vals.length ? M.fmt(Math.min(...vals)) : '—';
  $('#statDelta').innerHTML = delta == null ? '—' :
    `<span class="${sgn(delta)}">${(delta >= 0 ? '+' : '') + M.fmt(delta).replace('$-','-$')}</span>`;
}

/* ══ Views & data flow ══════════════════════════════════════════════════ */
function setView(v) {
  S.view = v;
  $('#view-market').classList.toggle('hide', v !== 'market');
  $('#view-portfolio').classList.toggle('hide', v !== 'portfolio');
  $('#view-stat').classList.toggle('hide', v !== 'stat');
  document.querySelectorAll('.tabs .btn').forEach(b =>
    b.classList.toggle('on', b.dataset.view === (v === 'stat' ? 'portfolio' : v)));
}

async function loadOverview() {
  let d;
  try { d = await api('/api/overview'); }
  catch {
    $('#dot').className = 'dot err'; $('#statusText').textContent = t('connecting'); return;
  }
  S.assets = d.assets;
  S.thresholds = d.thresholds;
  S.cycleSeconds = d.cycle_seconds;
  S.cycle = d.cycle; S.updatedAt = d.updated_at;
  S.settings = { ...S.settings, ...d.settings,
    all_assets:S.settings?.all_assets, languages:S.settings?.languages,
    capital_min:S.settings?.capital_min, capital_max:S.settings?.capital_max };
  if (!S.weights) { S.weights = { ...d.weights }; S.defaults = { ...d.weights }; renderWeights(); }

  const held = new Set((S.manual?.holdings || []).map(h => h.symbol));
  for (const a of S.assets) if (held.has(a.symbol)) a.held = true;

  const errs = d.errors || [];
  $('#dot').className = 'dot' + (errs.length ? ' err' : '');
  updateStatusText();
  $('#subtitle').textContent =
    `${followedAssets().length}/${S.assets.length} · ${S.cycleSeconds}s`;

  renderGrid();
  renderMarketTiles();
}
function updateStatusText() {
  $('#statusText').textContent = S.updatedAt
    ? `${t('live')} · ${t('cycle')} ${S.cycle} · ${ago(S.updatedAt)}`
    : t('waiting');
}

async function refresh() {
  await loadManual();
  await loadOverview();
  if (S.view === 'portfolio') renderPortfolio();
  if (S.view === 'stat') drawStat();
}

function drawerBusy() {
  const amt = $('#amt');
  return !!amt && (document.activeElement === amt || amt.value !== '');
}

function connect() {
  const es = new EventSource('/api/stream');
  es.onmessage = () => {
    S.histCache = {}; S.priceCache = {};
    refresh();
    if (S.open && !drawerBusy()) openDrawer(S.open);
  };
  es.onerror = () => { $('#dot').className = 'dot err'; es.close(); setTimeout(connect, 5000); };
}

/* ══ Language & theme ═══════════════════════════════════════════════════ */
function setLang(code) {
  LANG = code;
  try { localStorage.setItem('lang', code); } catch {}
  document.documentElement.lang = code;
  applyStatic();
  populateLangSel();
  if (S.weights) renderWeights();
  if (S.assets.length) { renderGrid(); renderMarketTiles(); updateStatusText(); }
  if (S.view === 'portfolio' && S.manual) renderPortfolio();
  if (S.view === 'stat' && S.statMetric) openStat(S.statMetric);
}
function populateLangSel() {
  const sel = $('#langSel');
  sel.innerHTML = (S.settings?.languages || ['en']).map(c =>
    `<option value="${c}" ${c===LANG?'selected':''}>${LANG_NAMES[c]||c}</option>`).join('');
}

/* ══ Wiring ═════════════════════════════════════════════════════════════ */
document.querySelectorAll('#grid thead th[data-k]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.k;
    S.sort = S.sort.key === k ? { key:k, dir:-S.sort.dir } : { key:k, dir:k==='symbol'?1:-1 };
    renderGrid();
  });
});
document.querySelectorAll('.tabs .btn').forEach(b => {
  b.addEventListener('click', () => {
    setView(b.dataset.view);
    if (b.dataset.view === 'portfolio') renderPortfolio();
  });
});
$('#statBack').addEventListener('click', () => { setView('portfolio'); renderPortfolio(); });
$('#resetWeights').addEventListener('click', () => {
  S.weights = { ...S.defaults }; renderWeights(); renderGrid(); renderMarketTiles();
});
$('#resetManual').addEventListener('click', async () => {
  const amt = money(S.manual?.starting_capital ?? 100000, 0);
  if (!confirm(t('confirmReset', { amt }))) return;
  await api('/api/manual/reset', { method:'POST' });
  S.histCache = {};
  await refresh();
  toast(t('resetDone', { amt }));
});
$('#scrim').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  try { localStorage.setItem('theme', next); } catch {}
  if (S.open) openDrawer(S.open);
  else if (S.view === 'portfolio') renderPortfolio();
  else if (S.view === 'stat') drawStat();
}
$('#themeBtn').addEventListener('click', toggleTheme);
$('#landTheme').addEventListener('click', toggleTheme);
$('#setupBtn').addEventListener('click', showLanding);
$('#landGo').addEventListener('click', () => Landing.submit());
$('#selAll').addEventListener('click', () => {
  Landing.followed = new Set(S.settings.all_assets.map(a => a.symbol)); Landing.render();
});
$('#selNone').addEventListener('click', () => { Landing.followed.clear(); Landing.render(); });
$('#langSel').addEventListener('change', e => setLang(e.target.value));

window.addEventListener('resize', () => {
  if (S.view === 'portfolio') renderPortfolio();
  else if (S.view === 'stat') drawStat();
  else if (S.open && !drawerBusy()) openDrawer(S.open);
});
setInterval(updateStatusText, 15000);

/* ══ Boot ═══════════════════════════════════════════════════════════════ */
try {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) document.documentElement.dataset.theme = savedTheme;
} catch {}

(async function boot() {
  try { S.settings = await api('/api/settings'); }
  catch { S.settings = { initialized:false, language:'en', starting_capital:100000,
    followed:[], all_assets:[], languages:['en'], capital_min:100, capital_max:10000000 }; }
  let lang = null;
  try { lang = localStorage.getItem('lang'); } catch {}
  LANG = lang || S.settings.language || (navigator.language || 'en').slice(0,2);
  // A previously saved language may have been retired (Russian was); fall back
  // rather than presenting a selector with nothing selected.
  if (!(LANG in I18N)) LANG = 'en';
  document.documentElement.lang = LANG;
  applyStatic();
  populateLangSel();
  showLanding();
  connect();
})();
</script>
</body>
</html>
