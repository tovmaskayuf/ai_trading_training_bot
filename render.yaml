# One-click deployment blueprint for Render (free tier).
# Visit https://render.com/deploy?repo=https://github.com/tovmaskayuf/ai_trading_training_bot
# and Render reads this file to provision the service automatically.
services:
  - type: web
    # Must match the live service exactly, or a blueprint deploy provisions a
    # second one alongside it. Hyphens are not a style choice: this name becomes
    # the onrender.com subdomain, and underscores are not legal in a hostname
    # (RFC 1123), so Render rewrites them to hyphens regardless.
    name: ai-crypto-trading-training
    runtime: python
    plan: free
    # Frankfurt, not the default Oregon: Binance's API refuses requests from
    # US-hosted IP addresses (HTTP 451 geo-block), which starves 14 of the 15
    # assets of data. Only HYPE survives on a US host, because Hyperliquid's
    # API is not geo-blocked. Region is immutable after the service is created
    # -- to apply this, delete the service and deploy the blueprint again.
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      # Keyless CoinGecko is rate-limited per client IP, and Render's shared
      # free-tier egress is throttled on reputation regardless of our cadence,
      # so market cap and rank come back empty. A free demo key moves the quota
      # onto the key and fixes it. sync:false makes Render prompt for the value
      # instead of storing it in this file.
      - key: COINGECKO_API_KEY
        sync: false
      # "demo" (free, default) or "pro" -- they use different hosts and headers.
      - key: COINGECKO_PLAN
        value: demo
      # Accounts, portfolios and leaderboard standings. Without this the app
      # still runs, but falls back to a SQLite file on the instance's
      # ephemeral disk, so every account is wiped on restart and on the
      # 15-minute idle spin-down. Market data is unaffected either way -- it
      # is regenerable and stays on the ephemeral disk deliberately.
      - key: DATABASE_URL
        fromDatabase:
          name: tt-trading-db
          property: connectionString
      # Administrator credential. sync:false means Render prompts for it and
      # it is never written to this file -- the repository is public, and a
      # committed admin password would be readable by anyone. With this unset
      # no admin account is created at all, rather than one with a guessable
      # password. Re-applied on every boot, so changing it here rotates it.
      - key: MASTER_PASSWORD
        sync: false
      - key: MASTER_USERNAME
        value: master

databases:
  # Free Postgres EXPIRES 30 DAYS after creation, then is deleted after a
  # 14-day grace period. Upgrade or export before then or every account and
  # leaderboard standing goes with it.
  - name: tt-trading-db
    plan: free
    region: frankfurt          # must match the web service
    databaseName: tt_trading
    user: tt_trading
